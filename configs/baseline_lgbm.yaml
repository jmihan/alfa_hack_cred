# Бейзлайн: LightGBM LambdaRank на полном feature set.
# Запуск: python scripts/train.py --config configs/baseline_lgbm.yaml
experiment_name: alfa_cred
run_name: baseline_lgbm_lambdarank

model:
  type: lgbm_ranker
  n_estimators: 3000
  early_stopping_rounds: 150
  params:
    objective: lambdarank
    metric: ndcg
    eval_at: [5]
    lambdarank_truncation_level: 5
    learning_rate: 0.05
    num_leaves: 127
    min_data_in_leaf: 100
    feature_fraction: 0.85
    bagging_fraction: 0.85
    bagging_freq: 5
    lambda_l2: 1.0
    verbose: -1
    n_jobs: -1
    seed: 42

features:
  min_fill_rate: 0.5

cv:
  scheme: group
  n_splits: 5
  random_state: 42

inference:
  apply_pil1mtrx_rule: true
