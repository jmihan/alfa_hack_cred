# LightGBM с расширенным feature set (cross-rank по offer_type/risk_level_map,
# pairwise diff, дополнительные категориальные клиента) и Optuna-параметрами.
experiment_name: alfa_cred
run_name: lgbm_extended_features

model:
  type: lgbm_ranker
  n_estimators: 4000
  early_stopping_rounds: 200
  params:
    objective: lambdarank
    metric: ndcg
    eval_at: [5]
    lambdarank_truncation_level: 5
    learning_rate: 0.0138
    num_leaves: 374
    min_data_in_leaf: 388
    feature_fraction: 0.78
    bagging_fraction: 0.89
    bagging_freq: 5
    lambda_l1: 0.0005
    lambda_l2: 7.0e-05
    min_gain_to_split: 0.013
    max_depth: 0
    verbose: -1
    n_jobs: -1
    seed: 42

features:
  min_fill_rate: 0.3

cv:
  scheme: group
  n_splits: 5
  random_state: 42

inference:
  apply_pil1mtrx_rule: true
