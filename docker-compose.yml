# Режимы запуска пайплайна. CPU-сервисы используют образ alfa-cred:latest
# (Dockerfile); train-gpu — образ alfa-cred:gpu (Dockerfile.gpu). У каждого сервиса
# свой профиль, поэтому `docker compose up` НЕ запускает их пачкой, а `run --rm
# <service>` сам активирует нужный профиль. Сборка образа — обычным `docker build`:
#
#   docker build -t alfa-cred:latest .                # собрать CPU-образ
#   docker compose run --rm reproduce                 # БАЙТ-В-БАЙТ лучший сабмит, ~2 мин, GPU не нужен
#   docker compose run --rm train                     # обучить С НУЛЯ (CPU) + сохранить модели + сабмит
#   docker compose run --rm inference                 # собрать сабмит из обученных моделей (без обучения)
#   docker compose run --rm cv                        # обучение/CV одиночной модели по YAML-конфигу (эксперименты)
#   docker compose run --rm interpret                 # SHAP + permutation интерпретация
#   docker build -f Dockerfile.gpu -t alfa-cred:gpu . # собрать GPU-образ
#   docker compose --profile gpu run --rm train-gpu   # обучение, XGB/CatBoost на GPU; нужен nvidia-container-toolkit
#   docker compose --profile mlflow up                # MLflow UI на http://localhost:5000 (только UI, обучение не стартует)
#
# Данные должны лежать в ./data. Точное воспроизведение рекорда: docker compose run --rm reproduce.

name: alfa-cred

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: alfa-cred:latest
  working_dir: /app
  environment:
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./data:/app/data
    - ./artifacts:/app/artifacts
    - ./models:/app/models
    - ./oof:/app/oof
    - ./submissions:/app/submissions
    - ./mlruns:/app/mlruns
    - ./reports:/app/reports
    - ./configs:/app/configs

services:
  # БАЙТ-В-БАЙТ сборка лучшего сабмита из зафиксированных предсказаний в
  # ./artifacts/record (A-сторона record_11 + B-сторона bAllL). Детерминированно
  # на любой машине, GPU не нужен, ~2 мин. Сверяет sha256 с эталоном.
  reproduce:
    <<: *common
    profiles: ["reproduce"]
    command: ["python", "scripts/reproduce_record.py", "--out", "submissions/record_submission.csv"]

  # Обучение пайплайна С НУЛЯ на CPU: A-бленд (5) + bAllL (5 XGB + 1 LGBM),
  # сохранение моделей в ./models и запись сабмита (~55 мин).
  train:
    <<: *common
    profiles: ["train"]
    command: ["python", "scripts/fit_pipeline.py", "--out", "submissions/record_submission.csv"]

  # То же обучение, но XGBoost/CatBoost — на GPU (LightGBM на CPU, как весь хакатон).
  # Требует nvidia-container-toolkit на хосте. Числа GPU отличаются от CPU (не байт-в-байт).
  train-gpu:
    <<: *common
    profiles: ["gpu"]
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: alfa-cred:gpu
    command: ["python", "scripts/fit_pipeline.py", "--out", "submissions/record_submission.csv"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Сборка сабмита из УЖЕ ОБУЧЕННЫХ моделей (./models), без обучения (~5 мин).
  inference:
    <<: *common
    profiles: ["inference"]
    command: ["python", "scripts/predict.py", "--out", "submissions/record_submission.csv"]

  # Обучение/CV одиночной модели по YAML-конфигу (эксперименты + MLflow).
  # Конфиг переопределяется: TRAIN_CONFIG=configs/lgbm_optuna.yaml docker compose run --rm cv
  cv:
    <<: *common
    profiles: ["cv"]
    command: ["python", "scripts/train.py", "--config", "${TRAIN_CONFIG:-configs/lgbm_extended.yaml}"]

  # Интерпретация B-модели: SHAP + group-aware permutation на NDCG@5.
  interpret:
    <<: *common
    profiles: ["interpret"]
    command: ["python", "scripts/explain.py"]

  # MLflow UI поверх ./mlruns. Открывать по http://localhost:5000 (внутри контейнера
  # сервер слушает 0.0.0.0:5000, наружу проброшен на localhost). Запускает ТОЛЬКО UI.
  mlflow-ui:
    <<: *common
    profiles: ["mlflow"]
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "mlruns/"]
    ports:
      - "5000:5000"
