# Режимы запуска пайплайна. Все сервисы используют один образ (alfa-cred:latest)
# и монтируют данные/артефакты как volume. Запуск конкретного режима — по профилю:
#
#   docker compose build
#   docker compose run --rm train          # обучить весь пайплайн С НУЛЯ + сохранить модели в ./models + сабмит
#   docker compose run --rm inference      # собрать сабмит из обученных моделей (без обучения)
#   docker compose run --rm cv             # обучение/CV одиночной модели по YAML-конфигу (эксперименты)
#   docker compose run --rm interpret      # SHAP + permutation интерпретация
#   docker compose --profile mlflow up     # MLflow UI на http://localhost:5000
#   docker compose --profile notebook up   # Jupyter на http://localhost:8888
#
# Данные должны лежать в ./data. Полное воспроизведение рекорда с нуля:
#   docker compose run --rm train          # ~50 мин: обучит и сохранит все модели, запишет сабмит
# Дальнейшие пересборки сабмита — быстрый inference из ./models.

name: alfa-cred

x-common: &common
  build:
    context: .
    dockerfile: Dockerfile
  image: alfa-cred:latest
  working_dir: /app
  environment:
    PYTHONUNBUFFERED: "1"
  volumes:
    - ./data:/app/data
    - ./models:/app/models
    - ./oof:/app/oof
    - ./submissions:/app/submissions
    - ./mlruns:/app/mlruns
    - ./reports:/app/reports
    - ./configs:/app/configs
    - ./notebooks:/app/notebooks
  # GPU (опционально): раскомментировать и запускать с CUDA-совместимым образом.
  # Рекорд считается на CPU, поэтому по умолчанию выключено.
  # deploy:
  #   resources:
  #     reservations:
  #       devices:
  #         - driver: nvidia
  #           count: all
  #           capabilities: [gpu]

services:
  # Полное обучение рекордного пайплайна С НУЛЯ: A-бленд (5) + B-бленд (8) + MLP (3),
  # сохранение моделей в ./models и запись сабмита (~50 мин на CPU).
  train:
    <<: *common
    profiles: ["train"]
    command: ["python", "scripts/fit_pipeline.py", "--out", "submissions/record_submission.csv"]

  # Сборка сабмита из УЖЕ ОБУЧЕННЫХ моделей (./models), без обучения (~10 мин).
  inference:
    <<: *common
    profiles: ["inference"]
    command: ["python", "scripts/predict.py", "--out", "submissions/record_submission.csv"]

  # Обучение/CV одиночной модели по YAML-конфигу (эксперименты + MLflow).
  # Конфиг переопределяется: TRAIN_CONFIG=configs/lgbm_optuna.yaml docker compose run --rm cv
  cv:
    <<: *common
    profiles: ["cv"]
    command: ["python", "scripts/train.py", "--config", "${TRAIN_CONFIG:-configs/lgbm_extended.yaml}"]

  # Интерпретация B-модели: SHAP + group-aware permutation на NDCG@5.
  interpret:
    <<: *common
    profiles: ["interpret"]
    command: ["python", "scripts/explain.py"]

  # MLflow UI поверх ./mlruns.
  mlflow-ui:
    <<: *common
    profiles: ["mlflow"]
    command: ["mlflow", "ui", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "mlruns/"]
    ports:
      - "5000:5000"

  # Jupyter для EDA/ноутбуков (без токена — локальный запуск).
  notebook:
    <<: *common
    profiles: ["notebook"]
    command:
      - "jupyter"
      - "notebook"
      - "--ip=0.0.0.0"
      - "--port=8888"
      - "--no-browser"
      - "--allow-root"
      - "--NotebookApp.token="
    ports:
      - "8888:8888"
