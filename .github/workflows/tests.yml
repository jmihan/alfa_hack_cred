name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Тесты на синтетике — данные хакатона и тяжёлые зависимости (torch/lightgbm)
      # не нужны, ставим минимум для быстрого прогона.
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install numpy==1.26.4 pandas==2.2.2 pytest==8.2.2 ruff==0.5.7
          pip install -e . --no-build-isolation
      - name: Lint (ruff)
        run: ruff check src scripts tests
      - name: Run unit tests
        run: pytest -q
